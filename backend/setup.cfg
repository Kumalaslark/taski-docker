[flake8]
# Игнорируем ошибки отсутствия docstrings (D100-D107) и порядок импортов (I001, I003)
ignore = 
    W503,
    D100,
    D101,
    D102,
    D103,
    D104,
    D105,
    D106,
    D107,
    I001,
    I003

# Исключаем файлы, которые не нужно проверять
exclude = 
    tests/,
    */migrations/,
    venv/,
    */venv/,
    env/,
    */env/

# Разрешаем длинные строки только в settings.py
per-file-ignores =
    */settings.py:E501